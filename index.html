  { key:'RUTA_1', nombre:'San Guillermo y Rey Papatzín', color:'#9C27B0', num:1 },

];

const legend = document.getElementById('legend');
const simbDiv = document.getElementById('simb-layers');
const serviciosDiv = document.getElementById('servicios-layers');
const infoBar = document.getElementById('info-bar');

function makeLabelIcon(num, color) {
  return L.divIcon({
    className: '',
    html: `<div style="background:white;border:3px solid ${color};border-radius:50%;
      width:28px;height:28px;display:flex;align-items:center;justify-content:center;
      font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
      color:${color};box-shadow:0 1px 4px rgba(0,0,0,0.25);">${num}</div>`,
    iconSize:[28,28], iconAnchor:[14,14]
  });
}

function getPeriphery(geojsonData) {
  const coords = [];
  const collect = (c) => { if(typeof c[0]==='number') coords.push(c); else c.forEach(collect); };
  geojsonData.features.forEach(f => { if(f.geometry) collect(f.geometry.coordinates); });
  if(!coords.length) return null;
  return [coords[0][1], coords[0][0]];
}

// Rutas peatonales
RUTAS.forEach(r => {
  const layer = L.geoJSON(GEO[r.key], {
    style: { color:r.color, weight:3, opacity:0.9, dashArray:'8, 8' },
    onEachFeature: (feature, lyr) => {
      lyr.bindPopup(`<div class="popup-title" style="color:${r.color}">Ruta ${r.num} — ${r.nombre}</div>`);
      lyr.on('click', () => { infoBar.textContent = 'Ruta ' + r.num + ' — ' + r.nombre; });
    }
  }).addTo(map);

  const pt = getPeriphery(GEO[r.key]);
  if(pt) L.marker(pt, { icon:makeLabelIcon(r.num, r.color), interactive:false }).addTo(map);

  const row = document.createElement('div');
  row.className = 'layer-row';
  const cbId = 'cb_' + r.num;
  row.innerHTML = `
    <input type="checkbox" id="${cbId}" checked>
    <div class="swatch" style="background:${r.color}">${r.num}</div>
    <label class="layer-label" for="${cbId}">${r.nombre}</label>`;
  const cb = row.querySelector('input');
  const lbl = row.querySelector('.layer-label');
  cb.addEventListener('change', e => {
    e.target.checked ? map.addLayer(layer) : map.removeLayer(layer);
    lbl.classList.toggle('dimmed', !e.target.checked);
  });
  legend.appendChild(row);
});

// Simbología: Operativo Movilidad (polígono amarillo punteado)
const operativoLayer = L.geoJSON(GEO.OPERATIVO, {
  style: { stroke:false, fill:true, fillColor:'#F9A825', fillOpacity:0.28 },
  onEachFeature: (f,l) => {
    l.bindPopup('<div class="popup-title" style="color:#F9A825">Operativo Movilidad</div>');
    if(l.options) l.options.stroke = false;
  }
}).addTo(map);
operativoLayer.eachLayer(l => { if(l.setStyle) l.setStyle({stroke:false, fill:true, fillColor:'#F9A825', fillOpacity:0.28}); });

// Simbología: Área Cierres Viales SSC (polígono azul punteado)
const cierresLayer = L.geoJSON(GEO.CIERRES, {
  style: { stroke:false, fill:true, fillColor:'#1E88E5', fillOpacity:0.28 },
  onEachFeature: (f,l) => {
    l.bindPopup('<div class="popup-title" style="color:#1E88E5">Área Cierres Viales SSC</div>');
    if(l.options) l.options.stroke = false;
  }
}).addTo(map);
cierresLayer.eachLayer(l => { if(l.setStyle) l.setStyle({stroke:false, fill:true, fillColor:'#1E88E5', fillOpacity:0.28}); });

// Simbología: Distribución Accesos (línea gris punteada)
const distribLayer = L.geoJSON(GEO.DISTRIBUCION, {
  style: { color:'#616161', weight:2, opacity:0.8, dashArray:'4,4' },
  onEachFeature: (f,l) => l.bindPopup('<div class="popup-title" style="color:#616161">Distribución de Accesos</div>')
}).addTo(map);

// Agregar simbología al panel
[
  { layer:operativoLayer, color:'#F9A825', tipo:'area', nombre:'Operativo movilidad' },
  { layer:cierresLayer,   color:'#1E88E5', tipo:'area', nombre:'Área cierres viales SSC' },
  { layer:distribLayer,   color:'#616161', tipo:'line', nombre:'Distribución accesos' },
].forEach(s => {
  const row = document.createElement('div');
  row.className = 'layer-row';
  const cbId = 'cb_' + s.nombre.replace(/\s/g,'_');
  const swatchHtml = s.tipo === 'area'
    ? `<div class="swatch-area" style="background:${s.color};border:2px dashed ${s.color};"></div>`
    : `<div class="swatch-line" style="background:repeating-linear-gradient(90deg,${s.color} 0,${s.color} 4px,transparent 4px,transparent 8px);"></div>`;
  row.innerHTML = `<input type="checkbox" id="${cbId}" checked>${swatchHtml}<label class="layer-label" for="${cbId}">${s.nombre}</label>`;
  const cb = row.querySelector('input');
  const lbl = row.querySelector('.layer-label');
  cb.addEventListener('change', e => {
    e.target.checked ? map.addLayer(s.layer) : map.removeLayer(s.layer);
    lbl.classList.toggle('dimmed', !e.target.checked);
  });
  simbDiv.appendChild(row);
});

const sscIcon = L.divIcon({
  className:'',
  html:`<div style="width:34px;height:34px;border-radius:50%;background:#1a4d2e;
    border:2px solid #c8d96f;box-shadow:0 2px 6px rgba(0,0,0,0.35);overflow:hidden;">
    <img src="${LOGO_SSC}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>`,
  iconSize:[34,34], iconAnchor:[17,17], popupAnchor:[0,-20]
});
SSC_MODULOS.forEach(m => {
  L.marker([m.lat,m.lng],{icon:sscIcon})
    .bindPopup('<div class="popup-title" style="color:#1a4d2e;">Módulo de Información</div><span class="popup-detail">Secretaría de Seguridad y Protección Ciudadana</span>')
    .addTo(map);
});

// Accesos A y B
const ACCESOS = [
  { lat:19.303466091676228, lng:-99.15462597899831, nombre:'Acceso B' },
  { lat:19.301997013585424, lng:-99.148335407024,   nombre:'Acceso A' },
];
ACCESOS.forEach(a => {
  const letra = a.nombre.split(' ')[1];
  const icon = L.divIcon({
    className:'',
    html:`<div style="width:28px;height:28px;border-radius:50%;background:#E53935;border:3px solid #111;
      box-shadow:0 2px 6px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;
      font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:white;">${letra}</div>`,
    iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-16]
  });
  L.marker([a.lat,a.lng],{icon})
    .bindPopup(`<div class="popup-title" style="color:#E53935;">${a.nombre}</div><span class="popup-detail">Punto de acceso al estadio</span>`)
    .addTo(map);
});

// Panel Servicios
[
  { html:`<div style="width:22px;height:22px;border-radius:50%;overflow:hidden;flex-shrink:0;"><img src="${LOGO_SSC}" style="width:100%;height:100%;object-fit:cover;"></div>`, nombre:'Módulo SSC' },
  { html:`<div style="width:22px;height:22px;border-radius:50%;background:#E53935;border:3px solid #111;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:white;">A/B</div>`, nombre:'Accesos' },
].forEach(s => {
  const row = document.createElement('div');
  row.className = 'fixed-row';
  row.innerHTML = `${s.html}<span class="fixed-label">${s.nombre}</span>`;
  serviciosDiv.appendChild(row);
});
</script>
