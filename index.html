<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rutas Peatonales — Estadio Azteca 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-measure@3.1.0/dist/leaflet-measure.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; background: #0a0a0a; color: #f0f0f0; }

    #header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
      padding: 18px 24px 40px;
      pointer-events: none;
    }
    #header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px; font-weight: 700; letter-spacing: 1px;
      color: #fff; text-transform: uppercase;
    }
    #header p { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 2px; }

    #map { width: 100%; height: 100vh; }

    #panel {
      position: absolute; top: 80px; right: 16px; z-index: 1000;
      background: rgba(10,10,10,0.92);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 14px 16px;
      width: 230px; backdrop-filter: blur(8px);
    }
    #panel h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
      margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 8px;
    }
    .layer-row {
      display: flex; align-items: center; gap: 9px;
      margin: 7px 0; cursor: pointer;
    }
    .layer-row input[type=checkbox] { cursor: pointer; accent-color: #fff; }
    .swatch {
      width: 20px; height: 4px; border-radius: 2px; flex-shrink: 0;
    }
    .layer-label { font-size: 13px; color: rgba(255,255,255,0.85); user-select: none; }
    .layer-label.dimmed { color: rgba(255,255,255,0.3); text-decoration: line-through; }

    #info-bar {
      position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
      z-index: 1000; background: rgba(10,10,10,0.88);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 8px 18px;
      font-size: 13px; color: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px); white-space: nowrap;
      transition: opacity 0.3s;
    }

    .leaflet-popup-content-wrapper {
      background: #111 !important; color: #f0f0f0 !important;
      border: 1px solid rgba(255,255,255,0.15) !important;
      border-radius: 8px !important; box-shadow: none !important;
    }
    .leaflet-popup-tip { background: #111 !important; }
    .leaflet-popup-content { font-family: 'Barlow', sans-serif; font-size: 13px; }
    .popup-title { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .popup-detail { color: rgba(255,255,255,0.55); font-size: 12px; }

    .leaflet-control-measure { background: rgba(10,10,10,0.88) !important; color: #f0f0f0 !important; border: 1px solid rgba(255,255,255,0.12) !important; }
    .leaflet-control-scale-line { background: rgba(10,10,10,0.7) !important; color: #f0f0f0 !important; border-color: rgba(255,255,255,0.3) !important; }
  </style>
</head>
<body>

<div id="header">
  <h1>Estadio Azteca · Copa del Mundo 2026</h1>
  <p>Rutas peatonales de acceso · Haz clic en una ruta para ver detalles</p>
</div>

<div id="panel">
  <h2>Capas visibles</h2>
  <div id="legend"></div>
</div>

<div id="map"></div>
<div id="info-bar">Selecciona una ruta para ver información</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-measure@3.1.0/dist/leaflet-measure.min.js"></script>
<script>

const map = L.map('map', { zoomControl: true }).setView([19.3035, -99.1507], 14);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap · © CARTO',
  maxZoom: 19
}).addTo(map);

L.control.scale({ imperial: false, metric: true, position: 'bottomleft' }).addTo(map);

const measureControl = new L.Control.Measure({
  primaryLengthUnit: 'meters',
  secondaryLengthUnit: 'kilometers',
  primaryAreaUnit: 'sqmeters',
  position: 'bottomleft'
});
measureControl.addTo(map);

// ── Configura tus rutas aquí ──
const RUTAS = [
  { archivo: 'RUTA_1_SANTA_URSULA.geojson',          nombre: 'Ruta Santa Úrsula',              color: '#CE93D8', tipo: 'ruta' },
  { archivo: 'RUTA_2_BOULEVARD_GRAN_SUR.geojson',    nombre: 'Ruta Blvd. Gran Sur (Cantera)',  color: '#A1887F', tipo: 'ruta' },
  { archivo: 'RUTA_3_AVENIDA_ESTADIO_AZTECA.geojson',nombre: 'Ruta Av. Estadio Azteca',        color: '#EF9A9A', tipo: 'ruta' },
  { archivo: 'RUTA_4_RENATO_LEDUC.geojson',          nombre: 'Ruta Renato Leduc',              color: '#FFF176', tipo: 'ruta' },
  { archivo: 'RUTA_5_CALZADA_DE_TLALPAN.geojson',    nombre: 'Ruta Calz. Tlalpan',            color: '#A5D6A7', tipo: 'ruta' },
  { archivo: 'RUTA_6_CALZADA_ACOXPA.geojson',        nombre: 'Ruta Paseo Acoxpa',             color: '#80DEEA', tipo: 'ruta' },
  { archivo: 'RUTA_7_EL_VERGEL.geojson',             nombre: 'Ruta El Vergel',                color: '#90CAF9', tipo: 'ruta' },
  { archivo: 'RUTAS_EXTRAS.geojson',                 nombre: 'Rutas extras',                  color: '#FFAB91', tipo: 'extra' },
  { archivo: 'AMARILLO_1.geojson',                   nombre: 'Zona Amarillo 1',               color: '#FFEE58', tipo: 'zona' },
  { archivo: 'ULTIMA_MILLA.geojson',                 nombre: 'Última milla',                  color: '#B0BEC5', tipo: 'zona' },
];

const legend = document.getElementById('legend');
const infoBar = document.getElementById('info-bar');

RUTAS.forEach(r => {
  fetch(r.archivo)
    .then(res => {
      if (!res.ok) throw new Error('No encontrado: ' + r.archivo);
      return res.json();
    })
    .then(data => {
      const esLinea = r.tipo === 'ruta' || r.tipo === 'extra';
      const layer = L.geoJSON(data, {
        style: esLinea
          ? { color: r.color, weight: 4, opacity: 0.9 }
          : { color: r.color, weight: 2, opacity: 0.7, fillColor: r.color, fillOpacity: 0.15 },
        onEachFeature: (feature, lyr) => {
          const props = feature.properties || {};
          const extra = Object.entries(props)
            .filter(([k]) => !['fid','id'].includes(k.toLowerCase()))
            .map(([k,v]) => `<span class="popup-detail">${k}: ${v}</span>`)
            .join('<br>');
          lyr.bindPopup(`
            <div class="popup-title" style="color:${r.color}">${r.nombre}</div>
            ${extra || '<span class="popup-detail">Sin atributos adicionales</span>'}
          `);
          lyr.on('click', () => {
            infoBar.textContent = r.nombre;
          });
        }
      }).addTo(map);

      const row = document.createElement('div');
      row.className = 'layer-row';
      const cbId = 'cb_' + r.archivo.replace(/\W/g,'_');
      row.innerHTML = `
        <input type="checkbox" id="${cbId}" checked>
        <div class="swatch" style="background:${r.color}"></div>
        <label class="layer-label" for="${cbId}">${r.nombre}</label>
      `;
      const cb = row.querySelector('input');
      const lbl = row.querySelector('.layer-label');
      cb.addEventListener('change', e => {
        if (e.target.checked) { map.addLayer(layer); lbl.classList.remove('dimmed'); }
        else { map.removeLayer(layer); lbl.classList.add('dimmed'); }
      });
      legend.appendChild(row);
    })
    .catch(err => console.warn(err.message));
});

</script>
</body>
</html>
